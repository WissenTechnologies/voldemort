<div [style.height]="height + 'px'" class="relative flex items-center justify-center">
  <!-- Simple SVG Chart Placeholder -->
  <svg class="w-full h-full" viewBox="0 0 400 300">
    <!-- Grid lines -->
    <g class="grid-lines" stroke="rgba(255,255,255,0.1)" stroke-width="1">
      <line x1="40" y1="20" x2="40" y2="260" />
      <line x1="40" y1="260" x2="380" y2="260" />
      <line x1="40" y1="80" x2="380" y2="80" stroke-dasharray="2,2" />
      <line x1="40" y1="140" x2="380" y2="140" stroke-dasharray="2,2" />
      <line x1="40" y1="200" x2="380" y2="200" stroke-dasharray="2,2" />
    </g>
    
    <!-- Sample price line -->
    <polyline
      fill="none"
      stroke="rgb(75, 192, 192)"
      stroke-width="2"
      points="40,200 80,180 120,160 160,140 200,150 240,120 280,100 320,110 360,90"
    />
    
    <!-- Data points -->
    <g fill="rgb(75, 192, 192)">
      <circle cx="40" cy="200" r="3" />
      <circle cx="80" cy="180" r="3" />
      <circle cx="120" cy="160" r="3" />
      <circle cx="160" cy="140" r="3" />
      <circle cx="200" cy="150" r="3" />
      <circle cx="240" cy="120" r="3" />
      <circle cx="280" cy="100" r="3" />
      <circle cx="320" cy="110" r="3" />
      <circle cx="360" cy="90" r="3" />
    </g>
  </svg>
  
  <!-- Overlay info -->
  <div class="absolute top-4 right-4 text-white text-sm bg-black/50 rounded px-2 py-1">
    {{ stockData.length }} points
  </div>
</div>
