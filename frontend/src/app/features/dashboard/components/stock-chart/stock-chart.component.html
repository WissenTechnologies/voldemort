<div [style.height.px]="height" class="relative w-full">
  <!-- Chart Container -->
  <div class="w-full h-full bg-gradient-to-b from-gray-800/50 to-gray-900/50 rounded-xl p-4">
    <canvas #chartCanvas class="w-full h-full"></canvas>
  </div>
  
  <!-- Loading State -->
  <div *ngIf="!chart" class="absolute inset-0 flex items-center justify-center bg-gray-900/80 rounded-xl">
    <div class="flex items-center space-x-2 text-gray-400">
      <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
      <span>Loading chart...</span>
    </div>
  </div>
  
  <!-- Hover Info Tooltip (shown when hovering) -->
  <div *ngIf="hoverData" class="absolute top-4 right-4 bg-gray-800/90 backdrop-blur-sm border border-gray-700 rounded-lg p-3 text-sm shadow-xl z-10">
    <div class="text-gray-400 text-xs mb-1">{{ hoverData.date }}</div>
    <div class="flex items-center justify-between space-x-4">
      <span class="text-gray-400">Price:</span>
      <span class="text-white font-semibold">{{ formatPrice(hoverData.price) }}</span>
    </div>
    <div class="flex items-center justify-between space-x-4 mt-1" *ngIf="hoverData.change !== undefined">
      <span class="text-gray-400">Change:</span>
      <span [class]="hoverData.change >= 0 ? 'text-green-400' : 'text-red-400'">
        {{ formatPercent(hoverData.changePercent ?? 0) }}
      </span>
    </div>
  </div>
  
  <!-- Stats Summary -->
  <div class="absolute bottom-4 left-4 right-4 flex justify-between text-xs">
    <div class="bg-gray-800/80 backdrop-blur-sm rounded-lg px-3 py-1.5 border border-gray-700">
      <span class="text-gray-400">High: </span>
      <span class="text-white font-medium">{{ formatPrice(stats.high) }}</span>
    </div>
    <div class="bg-gray-800/80 backdrop-blur-sm rounded-lg px-3 py-1.5 border border-gray-700">
      <span class="text-gray-400">Low: </span>
      <span class="text-white font-medium">{{ formatPrice(stats.low) }}</span>
    </div>
    <div class="bg-gray-800/80 backdrop-blur-sm rounded-lg px-3 py-1.5 border border-gray-700">
      <span class="text-gray-400">Avg: </span>
      <span class="text-white font-medium">{{ formatPrice(stats.avg) }}</span>
    </div>
    <div class="bg-gray-800/80 backdrop-blur-sm rounded-lg px-3 py-1.5 border border-gray-700">
      <span class="text-gray-400">Vol: </span>
      <span class="text-white font-medium">{{ formatVolume(stats.volume) }}</span>
    </div>
  </div>
</div>
