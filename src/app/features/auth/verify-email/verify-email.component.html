<div class="min-h-screen bg-gradient-to-br from-black via-gray-900 to-black flex items-center justify-center p-4 sm:p-6 lg:p-8">
  <div class="max-w-md w-full space-y-8 glass-darker rounded-2xl shadow-2xl p-8 sm:p-10 border border-gray-700 animate-slide-up">
    
    <!-- Success State -->
    <div *ngIf="isVerified" class="text-center">
      <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-gray-800 mb-6">
        <svg class="h-8 w-8 text-green-400" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
        </svg>
      </div>
      <h2 class="text-2xl font-bold text-white mb-2">Email Verified!</h2>
      <p class="text-gray-400 mb-6">{{ successMessage }}</p>
      <div class="w-12 h-12 border-4 border-white border-t-transparent rounded-full animate-spin mx-auto"></div>
    </div>

    <!-- Verification Form -->
    <div *ngIf="!isVerified">
      <!-- Header -->
      <div class="text-center mb-8">
        <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-gray-800 mb-4">
          <svg class="h-8 w-8 text-white" viewBox="0 0 20 20" fill="currentColor">
            <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
            <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
          </svg>
        </div>
        <h2 class="text-2xl sm:text-3xl font-bold text-white mb-2">
          Verify Your Email
        </h2>
        <p class="text-sm sm:text-base text-gray-400">
          We've sent a verification code to<br>
          <span class="font-semibold text-white">{{ email }}</span>
        </p>
      </div>

      <!-- Messages -->
      <app-alert-message 
        *ngIf="errorMessage" 
        type="error" 
        [message]="errorMessage"
        (dismissed)="errorMessage = ''">
      </app-alert-message>

      <app-alert-message 
        *ngIf="successMessage" 
        type="success" 
        [message]="successMessage"
        (dismissed)="successMessage = ''">
      </app-alert-message>

      <!-- Form -->
      <form [formGroup]="verificationForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <div>
          <label for="code" class="block text-sm font-medium text-gray-300 mb-2">
            Verification Code
          </label>
          <input
            type="text"
            id="code"
            formControlName="code"
            placeholder="000000"
            maxlength="6"
            class="appearance-none block w-full px-4 py-4 text-center text-2xl tracking-widest 
                   border border-gray-600 rounded-lg focus:outline-none focus:ring-2 
                   focus:ring-white focus:border-transparent transition duration-150 
                   ease-in-out bg-gray-800/50 focus:bg-gray-800 text-white"
            [class.border-red-300]="verificationForm.get('code')?.invalid && verificationForm.get('code')?.touched"
          >
          <div *ngIf="verificationForm.get('code')?.invalid && verificationForm.get('code')?.touched" 
               class="mt-2 text-xs text-red-400 text-center">
            Please enter a valid 6-digit code
          </div>
        </div>

        <button
          type="submit"
          [disabled]="verificationForm.invalid || isLoading"
          class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg 
                 shadow-sm text-sm font-medium text-white bg-gradient-to-r from-gray-700 to-gray-900 hover:from-gray-800 hover:to-black 
                 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-white 
                 transition duration-150 ease-in-out transform hover:scale-[1.02]
                 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <app-loading-spinner *ngIf="isLoading" size="sm" color="white"></app-loading-spinner>
          <span *ngIf="!isLoading">Verify Email</span>
        </button>
      </form>

      <!-- Resend Code -->
      <div class="mt-6 text-center">
        <p class="text-sm text-gray-400">
          Didn't receive the code?
          <button
            (click)="resendCode()"
            [disabled]="!canResend"
            class="ml-1 font-medium text-white hover:text-gray-300 
                   transition duration-150 ease-in-out disabled:opacity-50 
                   disabled:cursor-not-allowed"
          >
            <span *ngIf="!canResend">Resend in {{ resendCooldown }}s</span>
            <span *ngIf="canResend">Resend Code</span>
          </button>
        </p>
      </div>

      <!-- Back to Login -->
      <div class="mt-8 text-center border-t border-gray-700 pt-6">
        <a routerLink="/login" class="text-sm text-gray-400 hover:text-white 
                transition duration-150 ease-in-out">
          ← Back to Login
        </a>
      </div>
    </div>
  </div>
</div>
