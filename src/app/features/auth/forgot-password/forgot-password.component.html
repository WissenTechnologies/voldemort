<div class="min-h-screen bg-gradient-to-br from-black via-gray-900 to-black flex items-center justify-center p-4 sm:p-6 lg:p-8">
  <div class="max-w-md w-full space-y-8 glass-darker rounded-2xl shadow-2xl p-8 sm:p-10 border border-gray-700 animate-slide-up">
    
    <!-- Header -->
    <div class="text-center">
      <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-gray-800 mb-4">
        <svg class="h-8 w-8 text-white" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-3a1 1 0 00-.867.5 1 1 0 11-1.731-1A3 3 0 0113 8a3.001 3.001 0 01-2 2.83V11a1 1 0 11-2 0v-1a1 1 0 011-1 1 1 0 100-2zm0 8a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd" />
        </svg>
      </div>
      <h2 class="text-3xl sm:text-4xl font-extrabold text-white mb-2">
        Forgot Password?
      </h2>
      <p class="text-sm sm:text-base text-gray-400">
        Enter your email address and we'll send you an OTP to reset your password
      </p>
    </div>

    <!-- Success State -->
    <div *ngIf="isSubmitted" class="text-center">
      <app-alert-message 
        type="success" 
        [message]="successMessage">
      </app-alert-message>
      <button
        (click)="router.navigate(['/login'])"
        class="mt-4 text-white hover:text-gray-300 font-medium"
      >
        Enter OTP
      </button>
    </div>

    <!-- Form -->
    <div *ngIf="!isSubmitted">
      <!-- Error Alert -->
      <app-alert-message 
        *ngIf="errorMessage" 
        type="error" 
        [message]="errorMessage"
        (dismissed)="errorMessage = ''">
      </app-alert-message>

      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="mt-8 space-y-6">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-300 mb-1">
            Email Address
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-500" viewBox="0 0 20 20" fill="currentColor">
                <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
                <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
              </svg>
            </div>
            <input
              type="email"
              id="email"
              formControlName="email"
              placeholder="you@example.com"
              class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-600 rounded-lg 
                     placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-white 
                     focus:border-transparent transition duration-150 ease-in-out sm:text-sm
                     bg-gray-800/50 focus:bg-gray-800 text-white"
              [class.border-red-300]="email?.invalid && email?.touched"
            >
          </div>
          <div *ngIf="email?.invalid && email?.touched" class="mt-1 text-xs text-red-400 animate-fade-in">
            <span *ngIf="email?.errors?.['required']">Email is required</span>
            <span *ngIf="email?.errors?.['email']">Please enter a valid email address</span>
          </div>
        </div>

        <button
          type="submit"
          [disabled]="forgotForm.invalid || isLoading"
          class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg 
                 shadow-sm text-sm font-medium text-white bg-gradient-to-r from-gray-700 to-gray-900 hover:from-gray-800 hover:to-black 
                 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-white 
                 transition duration-150 ease-in-out transform hover:scale-[1.02]
                 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <app-loading-spinner *ngIf="isLoading" size="sm" color="white"></app-loading-spinner>
          <span *ngIf="!isLoading">Send OTP</span>
        </button>

        <!-- Back to Login -->
        <div class="text-center">
          <a routerLink="/login" class="text-sm text-gray-400 hover:text-white 
                  transition duration-150 ease-in-out">
            ← Back to Login
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
