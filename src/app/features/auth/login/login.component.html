<div class="min-h-screen bg-gradient-to-br from-black via-gray-900 to-black flex items-center justify-center p-4 sm:p-6 lg:p-8">
  <div class="max-w-md w-full space-y-8 glass-darker rounded-3xl shadow-2xl p-8 sm:p-10 border border-gray-700 animate-scale-in">
    
    <!-- Header -->
    <div class="text-center">
      <div class="mx-auto h-16 w-16 bg-gradient-to-br from-gray-700 to-gray-800 rounded-2xl flex items-center justify-center shadow-lg mb-6">
        <svg class="h-8 w-8 text-white" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
        </svg>
      </div>
      <h2 class="text-3xl sm:text-4xl font-extrabold text-white mb-2 tracking-tight">
        Welcome Back
      </h2>
      <p class="text-sm sm:text-base text-gray-400">
        Sign in to continue to your account
      </p>
    </div>

    <!-- Error Alert -->
    <app-alert-message 
      *ngIf="errorMessage" 
      type="error" 
      [message]="errorMessage"
      (dismissed)="errorMessage = ''">
    </app-alert-message>

    <!-- Login Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="mt-8 space-y-6">
      <div class="space-y-6">
        <!-- Email Field -->
        <div>
          <label for="email" class="block text-sm font-semibold text-gray-300 mb-2">
            Email Address
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-500" viewBox="0 0 20 20" fill="currentColor">
                <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
                <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
              </svg>
            </div>
            <input
              type="email"
              id="email"
              formControlName="email"
              placeholder="you@example.com"
              class="appearance-none block w-full pl-12 pr-4 py-4 border border-gray-600 rounded-2xl 
                     placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-white 
                     focus:border-transparent transition duration-200 ease-in-out sm:text-sm
                     bg-gray-800/50 focus:bg-gray-800 text-white"
              [class.border-red-300]="email?.invalid && email?.touched"
              [class.focus:ring-red-500]="email?.invalid && email?.touched"
            >
          </div>
          <div *ngIf="email?.invalid && email?.touched" class="mt-2 text-xs text-red-400 flex items-center">
            <svg class="w-4 h-4 mr-1" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
            </svg>
            <span *ngIf="email?.errors?.['required']">Email is required</span>
            <span *ngIf="email?.errors?.['email']">Please enter a valid email address</span>
          </div>
        </div>

        <!-- Password Field -->
        <div>
          <label for="password" class="block text-sm font-semibold text-gray-300 mb-2">
            Password
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-500" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
              </svg>
            </div>
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              formControlName="password"
              placeholder="••••••••"
              class="appearance-none block w-full pl-12 pr-16 py-4 border border-gray-600 rounded-2xl 
                     placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-white 
                     focus:border-transparent transition duration-200 ease-in-out sm:text-sm
                     bg-gray-800/50 focus:bg-gray-800 text-white"
              [class.border-red-300]="password?.invalid && password?.touched"
              [class.focus:ring-red-500]="password?.invalid && password?.touched"
            >
            <button
              type="button"
              (click)="showPassword = !showPassword"
              class="absolute inset-y-0 right-0 pr-4 flex items-center text-sm leading-5 group"
            >
              <span class="text-white hover:text-gray-300 font-semibold text-sm transition-colors">
                {{ showPassword ? 'Hide' : 'Show' }}
              </span>
            </button>
          </div>
          <div *ngIf="password?.invalid && password?.touched" class="mt-2 text-xs text-red-400 flex items-center">
            <svg class="w-4 h-4 mr-1" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
            </svg>
            <span *ngIf="password?.errors?.['required']">Password is required</span>
            <span *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters</span>
          </div>
        </div>
      </div>

      <!-- Remember Me & Forgot Password -->
      <div class="flex items-center justify-between">
        <div class="flex items-center">
          <input
            id="rememberMe"
            type="checkbox"
            formControlName="rememberMe"
            class="h-5 w-5 text-white focus:ring-white border-gray-600 rounded-xl 
                   transition duration-200 ease-in-out bg-gray-800"
          >
          <label for="rememberMe" class="ml-3 block text-sm font-medium text-gray-300">
            Remember me
          </label>
        </div>
        <div class="text-sm">
          <a routerLink="/forgot-password" class="font-semibold text-white hover:text-gray-300 
                  transition duration-200 ease-in-out">
            Forgot password?
          </a>
        </div>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="loginForm.invalid || isLoading"
        class="w-full flex justify-center py-4 px-4 border border-transparent rounded-2xl 
               shadow-lg text-sm font-semibold text-white bg-gradient-to-r from-gray-700 to-gray-900 hover:from-gray-800 hover:to-black 
               focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-white 
               transition duration-200 ease-in-out transform hover:scale-[1.02] hover:shadow-xl
               disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100 disabled:hover:shadow-lg"
      >
        <app-loading-spinner *ngIf="isLoading" size="sm" color="white"></app-loading-spinner>
        <span *ngIf="!isLoading" class="flex items-center">
          <svg class="w-5 h-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M3 3a1 1 0 011 1v12a1 1 0 11-2 0V4a1 1 0 011-1zm7.707 3.293a1 1 0 010 1.414L9.414 9H17a1 1 0 110 2H9.414l1.293 1.293a1 1 0 01-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0z" clip-rule="evenodd" />
          </svg>
          Sign In
        </span>
      </button>

      <!-- Sign Up Link -->
      <div class="text-center text-sm">
        <span class="text-gray-400">Don't have an account?</span>
        <a routerLink="/register" class="ml-1 font-semibold text-white hover:text-gray-300 
                transition duration-200 ease-in-out">
          Sign up
        </a>
      </div>
    </form>

    <!-- Development Quick Login -->
    <div *ngIf="!isLoading" class="mt-8 pt-6 border-t border-gray-700">
      <p class="text-xs text-center text-gray-500 mb-4 font-medium">Quick Login (Development)</p>
      <div class="grid grid-cols-2 gap-3">
        <button
          (click)="quickLogin(UserRole.ADMIN)"
          class="py-3 px-4 border border-gray-600 rounded-xl text-sm font-semibold 
                 text-gray-300 bg-gray-800 hover:bg-gray-700 focus:outline-none 
                 focus:ring-2 focus:ring-offset-2 focus:ring-white 
                 transition duration-200 ease-in-out hover:border-white"
        >
          <svg class="w-4 h-4 mr-2 inline" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
          </svg>
          Admin
        </button>
        <button
          (click)="quickLogin(UserRole.USER)"
          class="py-3 px-4 border border-gray-600 rounded-xl text-sm font-semibold 
                 text-gray-300 bg-gray-800 hover:bg-gray-700 focus:outline-none 
                 focus:ring-2 focus:ring-offset-2 focus:ring-white 
                 transition duration-200 ease-in-out hover:border-white"
        >
          <svg class="w-4 h-4 mr-2 inline" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
          </svg>
          User
        </button>
      </div>
    </div>
  </div>
</div>
