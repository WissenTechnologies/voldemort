<div class="min-h-screen bg-gradient-to-br from-black via-gray-900 to-black flex items-center justify-center p-4 sm:p-6 lg:p-8">
  <div class="max-w-md w-full space-y-8 glass-darker rounded-2xl shadow-2xl p-8 sm:p-10 border border-gray-700 animate-slide-up">
    
    <!-- Header -->
    <div class="text-center">
      <h2 class="text-3xl sm:text-4xl font-extrabold text-white mb-2">
        Create Account
      </h2>
      <p class="text-sm sm:text-base text-gray-400">
        Join us today! It takes only a few steps
      </p>
    </div>

    <!-- Error Alert -->
    <app-alert-message 
      *ngIf="errorMessage" 
      type="error" 
      [message]="errorMessage"
      (dismissed)="errorMessage = ''">
    </app-alert-message>

    <!-- Register Form -->
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="mt-8 space-y-5">
      <!-- Username Field -->
      <div>
        <label for="username" class="block text-sm font-medium text-gray-300 mb-1">
          Username
        </label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-gray-500" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
            </svg>
          </div>
          <input
            type="text"
            id="username"
            formControlName="username"
            placeholder="johndoe"
            class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-600 rounded-lg 
                   placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-white 
                   focus:border-transparent transition duration-150 ease-in-out sm:text-sm
                   bg-gray-800/50 focus:bg-gray-800 text-white"
            [class.border-red-300]="username?.invalid && username?.touched"
          >
        </div>
        <div *ngIf="username?.invalid && username?.touched" class="mt-1 text-xs text-red-400 animate-fade-in">
          <span *ngIf="username?.errors?.['required']">Username is required</span>
          <span *ngIf="username?.errors?.['minlength']">Username must be at least 3 characters</span>
        </div>
      </div>

      <!-- Email Field -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-300 mb-1">
          Email Address
        </label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-gray-500" viewBox="0 0 20 20" fill="currentColor">
              <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
              <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
            </svg>
          </div>
          <input
            type="email"
            id="email"
            formControlName="email"
            placeholder="you@example.com"
            class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-600 rounded-lg 
                   placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-white 
                   focus:border-transparent transition duration-150 ease-in-out sm:text-sm
                   bg-gray-800/50 focus:bg-gray-800 text-white"
            [class.border-red-300]="email?.invalid && email?.touched"
          >
        </div>
        <div *ngIf="email?.invalid && email?.touched" class="mt-1 text-xs text-red-400 animate-fade-in">
          <span *ngIf="email?.errors?.['required']">Email is required</span>
          <span *ngIf="email?.errors?.['email']">Please enter a valid email address</span>
        </div>
      </div>

      <!-- Password Field -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-300 mb-1">
          Password
        </label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-gray-500" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
            </svg>
          </div>
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            formControlName="password"
            placeholder="••••••••"
            class="appearance-none block w-full pl-10 pr-12 py-3 border border-gray-600 rounded-lg 
                   placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-white 
                   focus:border-transparent transition duration-150 ease-in-out sm:text-sm
                   bg-gray-800/50 focus:bg-gray-800 text-white"
            [class.border-red-300]="password?.invalid && password?.touched"
          >
          <button
            type="button"
            (click)="showPassword = !showPassword"
            class="absolute inset-y-0 right-0 pr-3 flex items-center text-sm leading-5"
          >
            <span class="text-white hover:text-gray-300 font-medium">
              {{ showPassword ? 'Hide' : 'Show' }}
            </span>
          </button>
        </div>
        <div *ngIf="password?.invalid && password?.touched" class="mt-1 text-xs text-red-400 animate-fade-in">
          <span *ngIf="password?.errors?.['required']">Password is required</span>
          <span *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters</span>
        </div>
      </div>

      <!-- Confirm Password Field -->
      <div>
        <label for="confirmPassword" class="block text-sm font-medium text-gray-300 mb-1">
          Confirm Password
        </label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-gray-500" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
            </svg>
          </div>
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            id="confirmPassword"
            formControlName="confirmPassword"
            placeholder="••••••••"
            class="appearance-none block w-full pl-10 pr-12 py-3 border border-gray-600 rounded-lg 
                   placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-white 
                   focus:border-transparent transition duration-150 ease-in-out sm:text-sm
                   bg-gray-800/50 focus:bg-gray-800 text-white"
            [class.border-red-300]="registerForm.hasError('passwordMismatch') && confirmPassword?.touched"
          >
          <button
            type="button"
            (click)="showConfirmPassword = !showConfirmPassword"
            class="absolute inset-y-0 right-0 pr-3 flex items-center text-sm leading-5"
          >
            <span class="text-white hover:text-gray-300 font-medium">
              {{ showConfirmPassword ? 'Hide' : 'Show' }}
            </span>
          </button>
        </div>
        <div *ngIf="registerForm.hasError('passwordMismatch') && confirmPassword?.touched" class="mt-1 text-xs text-red-400 animate-fade-in">
          Passwords do not match
        </div>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="registerForm.invalid || isLoading"
        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg 
               shadow-sm text-sm font-medium text-white bg-gradient-to-r from-gray-700 to-gray-900 hover:from-gray-800 hover:to-black 
               focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-white 
               transition duration-150 ease-in-out transform hover:scale-[1.02] mt-6
               disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100"
      >
        <app-loading-spinner *ngIf="isLoading" size="sm" color="white"></app-loading-spinner>
        <span *ngIf="!isLoading">Create Account</span>
      </button>

      <!-- Login Link -->
      <div class="text-center text-sm">
        <span class="text-gray-400">Already have an account?</span>
        <a routerLink="/login" class="ml-1 font-medium text-white hover:text-gray-300 
                transition duration-150 ease-in-out">
          Sign in
        </a>
      </div>
    </form>
  </div>
</div>
