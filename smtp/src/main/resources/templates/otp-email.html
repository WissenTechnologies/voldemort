<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
</head>
<body style="margin:0;padding:0;background:#f4f4f4;font-family:sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center" style="padding:40px 0;">
        <table width="520" cellpadding="0" cellspacing="0"
               style="background:#ffffff;border-radius:8px;overflow:hidden;">

          <!-- Header -->
          <tr>
            <td style="background:#1a73e8;padding:28px 40px;">
              <h1 style="margin:0;color:#ffffff;font-size:22px;">StockApp</h1>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:36px 40px;">
              <h2 style="margin:0 0 12px;font-size:18px;color:#1a1a1a;">
                Verify your email address
              </h2>
              <p style="margin:0 0 24px;font-size:15px;color:#555;line-height:1.6;">
                Use the code below to verify your email. It expires in
                <strong th:text="${expiry}">10 minutes</strong>.
              </p>

              <!-- OTP Box -->
              <div style="text-align:center;margin:0 0 28px;">
                <span th:text="${otp}"
                      style="display:inline-block;letter-spacing:10px;
                             font-size:36px;font-weight:700;color:#1a73e8;
                             background:#f0f6ff;padding:16px 32px;
                             border-radius:8px;border:1px solid #c5d9f7;">
                  000000
                </span>
              </div>

              <p style="margin:0;font-size:13px;color:#999;line-height:1.6;">
                If you did not request this, you can safely ignore this email.
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#f9f9f9;padding:16px 40px;
                       border-top:1px solid #eeeeee;">
              <p style="margin:0;font-size:12px;color:#aaa;">
                © 2025 StockApp. All rights reserved.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
