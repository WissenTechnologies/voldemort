spring.application.name=demo
server.port=5000

# H2 in-memory database for testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA configuration for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Reduce Hibernate/SQL logging
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.tool.schema=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# H2 Console (for testing)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# SMTP Configuration (keep existing for now)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true  
spring.mail.properties.mail.debug=true

# Note: Email credentials should be set via environment variables
spring.mail.username=aryaaangala@gmail.com
spring.mail.password=pnknyoofrbtqxfha

# Application Base URL
app.base-url=http://localhost:4200

# JWT Secret (should be environment variable in production)
# JWT_SECRET=${JWT_SECRET:mySuperSecretKeyThatIsAtLeast32CharactersLong}

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
